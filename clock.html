<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#061016" />
  <title>横屏信息钟</title>
  <style>
    :root {
      --bg: #061016;
      --panel: rgba(255, 255, 255, .075);
      --panel-strong: rgba(255, 255, 255, .12);
      --line: rgba(255, 255, 255, .13);
      --text: #f3f8f7;
      --muted: #a8b8b3;
      --accent: #6bd6c6;
      --accent-2: #f2c86d;
      --danger: #ff8f7e;
      --shadow: 0 28px 90px rgba(0, 0, 0, .38);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: pan-y;
    }

    body {
      display: grid;
      place-items: center;
      background:
        linear-gradient(120deg, rgba(107, 214, 198, .12), transparent 34%),
        linear-gradient(300deg, rgba(242, 200, 109, .12), transparent 38%),
        linear-gradient(135deg, #061016, #11191a 48%, #171515);
    }

    .screen {
      width: 100vw;
      height: 100vh;
      padding: clamp(10px, 2vw, 34px);
      display: grid;
      grid-template-columns: minmax(190px, .82fr) minmax(260px, 1.28fr) minmax(200px, .9fr);
      gap: clamp(10px, 1.4vw, 26px);
      transform: translate3d(var(--drift-x, 0px), var(--drift-y, 0px), 0);
      transition: transform 1.2s ease, opacity .35s ease;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(150deg, rgba(255, 255, 255, .105), rgba(255, 255, 255, .045));
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .weather {
      padding: clamp(12px, 2vw, 30px);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: clamp(8px, 1.5vh, 14px);
    }

    .panel-title {
      margin: 0;
      color: var(--muted);
      font-size: clamp(17px, 1.7vw, 24px);
      font-weight: 650;
      letter-spacing: 0;
    }

    .weather-main {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: clamp(10px, 1.6vw, 18px);
    }

    .weather-icon {
      width: clamp(58px, 8vw, 112px);
      height: clamp(58px, 8vw, 112px);
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .14);
      background: var(--panel);
      color: var(--accent-2);
      font-size: clamp(32px, 5vw, 64px);
    }

    .temperature {
      font-size: clamp(44px, 6.4vw, 86px);
      font-weight: 760;
      line-height: .88;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .condition {
      color: var(--text);
      font-size: clamp(17px, 2.2vw, 30px);
      font-weight: 700;
      letter-spacing: 0;
    }

    .weather-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-top: 6px;
      color: var(--muted);
      font-size: clamp(12px, 1.35vw, 17px);
      font-variant-numeric: tabular-nums;
    }

    .forecast-list {
      display: grid;
      align-content: start;
      gap: clamp(7px, 1.2vh, 10px);
      min-height: 0;
    }

    .forecast-card {
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      background: rgba(0, 0, 0, .12);
      padding: clamp(8px, 1.4vw, 13px);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: clamp(8px, 1.4vw, 14px);
    }

    .forecast-icon {
      color: var(--accent-2);
      font-size: clamp(22px, 3.2vw, 36px);
      line-height: 1;
    }

    .forecast-day {
      display: block;
      color: var(--text);
      font-size: clamp(16px, 1.9vw, 24px);
      font-weight: 760;
    }

    .forecast-condition {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: clamp(12px, 1.35vw, 17px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .forecast-temp {
      text-align: right;
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 780;
      font-variant-numeric: tabular-nums;
    }

    .center {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: clamp(16px, 2vh, 24px);
      padding: clamp(12px, 2vw, 32px);
    }

    .clock-stage {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .analog-clock {
      position: relative;
      width: min(53vh, 29vw, 100%);
      min-width: min(250px, 100%);
      aspect-ratio: 1;
      border-radius: 50%;
      border: clamp(6px, .85vw, 12px) solid rgba(232, 241, 236, .9);
      background:
        radial-gradient(circle at center, rgba(242, 200, 109, .16) 0 5px, transparent 6px),
        radial-gradient(circle at center, rgba(255, 255, 255, .04), rgba(0, 0, 0, .18) 68%, rgba(255, 255, 255, .08));
      box-shadow:
        inset 0 0 24px rgba(0, 0, 0, .34),
        0 18px 52px rgba(0, 0, 0, .32);
    }

    .analog-clock::before {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, .16);
    }

    .mark {
      position: absolute;
      inset: 5%;
      display: grid;
      place-items: start center;
      color: rgba(255, 255, 255, .86);
      font-size: clamp(15px, 1.7vw, 26px);
      font-weight: 760;
      transform: rotate(calc(var(--i) * 30deg));
    }

    .mark span {
      transform: rotate(calc(var(--i) * -30deg));
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      width: var(--w);
      height: var(--h);
      border-radius: 999px;
      background: var(--c);
      transform-origin: 50% 100%;
      transform: translateX(-50%) rotate(var(--r, 0deg));
      box-shadow: 0 0 12px rgba(0, 0, 0, .25);
    }

    .hour-hand {
      --w: clamp(8px, .8vw, 12px);
      --h: 27%;
      --c: #f5faf8;
    }

    .minute-hand {
      --w: clamp(5px, .55vw, 8px);
      --h: 38%;
      --c: #6bd6c6;
    }

    .pin {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(18px, 1.8vw, 28px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--accent-2);
      border: 4px solid #f8fbf6;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px rgba(242, 200, 109, .5);
    }

    .readout {
      display: grid;
      justify-items: center;
      gap: 8px;
      padding-bottom: 0;
    }

    .date-line {
      color: var(--muted);
      font-size: clamp(17px, 1.9vw, 28px);
      font-weight: 650;
      letter-spacing: 0;
      text-align: center;
    }

    .digital-time {
      font-size: clamp(50px, 7.2vw, 112px);
      font-weight: 820;
      line-height: .92;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 36px rgba(107, 214, 198, .22);
    }

    .reserve {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 14px;
      padding: clamp(12px, 2vw, 30px);
      overflow: hidden;
    }

    .slides {
      min-height: 0;
      overflow: hidden;
      border-radius: 8px;
      touch-action: pan-y;
    }

    .slide-track {
      height: 100%;
      display: flex;
      transform: translateX(calc(var(--page, 0) * -100%));
      transition: transform .36s ease;
    }

    .slide {
      min-width: 100%;
      padding: clamp(18px, 2.3vw, 30px);
      display: grid;
      align-content: center;
      gap: 18px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      background: rgba(0, 0, 0, .14);
    }

    .slide h2 {
      margin: 0;
      font-size: clamp(28px, 3.2vw, 46px);
      line-height: 1.12;
      font-weight: 780;
      letter-spacing: 0;
    }

    .slide p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(17px, 1.8vw, 24px);
      line-height: 1.45;
    }

    .placeholder-list {
      display: grid;
      gap: 12px;
    }

    .placeholder-row {
      height: clamp(16px, 2vh, 24px);
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 255, 255, .18), rgba(255, 255, 255, .055));
    }

    .placeholder-row:nth-child(2) { width: 82%; }
    .placeholder-row:nth-child(3) { width: 66%; }

    .pager {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .page-dot {
      width: 10px;
      height: 10px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .3);
      padding: 0;
    }

    .page-dot[aria-current="true"] {
      width: 28px;
      background: var(--accent);
    }

    .portrait-warning {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      padding: 32px;
      place-items: center;
      text-align: center;
      background: #061016;
      color: var(--text);
      font-size: 22px;
      line-height: 1.55;
    }

    .portrait-warning strong {
      display: block;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 30px;
    }

    .dim .screen { opacity: .3; }
    .dim body { background: #000; }

    @media (max-width: 900px) and (orientation: landscape) {
      .screen {
        padding: 8px;
        gap: 8px;
        grid-template-columns: minmax(190px, .84fr) minmax(260px, 1.32fr) minmax(210px, .96fr);
        transform: none;
      }

      .weather,
      .center,
      .reserve {
        padding: 10px;
      }

      .panel-title {
        font-size: 14px;
      }

      .weather-icon {
        width: 56px;
        height: 56px;
        font-size: 30px;
      }

      .temperature {
        font-size: 46px;
      }

      .condition {
        font-size: 16px;
      }

      .weather-meta {
        font-size: 12px;
      }

      .forecast-card {
        padding: 8px;
      }

      .analog-clock {
        width: min(46vh, 190px);
      }

      .center {
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 6px;
      }

      .date-line {
        font-size: 16px;
      }

      .digital-time {
        font-size: 70px;
      }

      .slide h2 {
        font-size: 28px;
      }

      .slide p {
        font-size: 16px;
      }

      .slide {
        gap: 12px;
        padding: 18px;
      }
    }

    @media (orientation: portrait) {
      .portrait-warning { display: grid; }
      .screen { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .screen,
      .slide-track {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="portrait-warning">
    <div>
      <strong>请横屏使用</strong>
      这个信息钟为横屏全屏显示设计。请开启自动旋转，或在设备中锁定 Landscape。
    </div>
  </div>

  <main class="screen" aria-label="横屏信息钟">
    <section class="panel weather" aria-label="天气">
      <h1 class="panel-title" id="weatherLocation">正在获取天气</h1>
      <div class="weather-main">
        <div class="weather-icon" id="weatherIcon" aria-hidden="true">--</div>
        <div>
          <div class="temperature" id="temperature">--°</div>
          <div class="condition" id="weatherText">等待定位</div>
          <div class="weather-meta">
            <span id="humidity">湿度 --%</span>
            <span id="windSpeed">风 --</span>
          </div>
        </div>
      </div>
      <div class="forecast-list" aria-label="今明两日天气">
        <div class="forecast-card" id="forecastToday">
          <div class="forecast-icon" aria-hidden="true">--</div>
          <div>
            <span class="forecast-day">今天</span>
            <span class="forecast-condition">等待数据</span>
          </div>
          <div class="forecast-temp">--°/--°</div>
        </div>
        <div class="forecast-card" id="forecastTomorrow">
          <div class="forecast-icon" aria-hidden="true">--</div>
          <div>
            <span class="forecast-day">明天</span>
            <span class="forecast-condition">等待数据</span>
          </div>
          <div class="forecast-temp">--°/--°</div>
        </div>
      </div>
      <div class="panel-title" id="weatherNote">允许定位后显示本地今明天气</div>
    </section>

    <section class="panel center" aria-label="机械钟与日期时间">
      <div class="clock-stage">
        <div class="analog-clock" aria-hidden="true">
          <div class="mark" style="--i: 0"><span>12</span></div>
          <div class="mark" style="--i: 1"><span>1</span></div>
          <div class="mark" style="--i: 2"><span>2</span></div>
          <div class="mark" style="--i: 3"><span>3</span></div>
          <div class="mark" style="--i: 4"><span>4</span></div>
          <div class="mark" style="--i: 5"><span>5</span></div>
          <div class="mark" style="--i: 6"><span>6</span></div>
          <div class="mark" style="--i: 7"><span>7</span></div>
          <div class="mark" style="--i: 8"><span>8</span></div>
          <div class="mark" style="--i: 9"><span>9</span></div>
          <div class="mark" style="--i: 10"><span>10</span></div>
          <div class="mark" style="--i: 11"><span>11</span></div>
          <div class="hand hour-hand" id="hourHand"></div>
          <div class="hand minute-hand" id="minuteHand"></div>
          <div class="pin"></div>
        </div>
      </div>
      <div class="readout" aria-live="polite">
        <div class="date-line" id="dateLine">2026年5月29日 星期五</div>
        <div class="digital-time" id="digitalTime">00:00</div>
      </div>
    </section>

    <section class="panel reserve" aria-label="预留滑动板块">
      <h1 class="panel-title">预留板块</h1>
      <div class="slides" id="slides">
        <div class="slide-track" id="slideTrack">
          <article class="slide">
            <h2>今日事项</h2>
            <p>这里可以放日程、提醒、值班表或家庭留言。</p>
            <div class="placeholder-list" aria-hidden="true">
              <div class="placeholder-row"></div>
              <div class="placeholder-row"></div>
              <div class="placeholder-row"></div>
            </div>
          </article>
          <article class="slide">
            <h2>设备状态</h2>
            <p>后续可接入门禁、摄像头、传感器、NAS 或 Home Assistant 信息。</p>
            <div class="placeholder-list" aria-hidden="true">
              <div class="placeholder-row"></div>
              <div class="placeholder-row"></div>
              <div class="placeholder-row"></div>
            </div>
          </article>
          <article class="slide">
            <h2>自定义内容</h2>
            <p>支持继续扩展为图片、公告、倒计时、二维码或快捷按钮。</p>
            <div class="placeholder-list" aria-hidden="true">
              <div class="placeholder-row"></div>
              <div class="placeholder-row"></div>
              <div class="placeholder-row"></div>
            </div>
          </article>
        </div>
      </div>
      <div class="pager" id="pager" aria-label="预留板块分页"></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    const el = {
      digitalTime: $("digitalTime"),
      dateLine: $("dateLine"),
      hourHand: $("hourHand"),
      minuteHand: $("minuteHand"),
      weatherLocation: $("weatherLocation"),
      weatherIcon: $("weatherIcon"),
      weatherText: $("weatherText"),
      temperature: $("temperature"),
      humidity: $("humidity"),
      windSpeed: $("windSpeed"),
      weatherNote: $("weatherNote"),
      forecastToday: $("forecastToday"),
      forecastTomorrow: $("forecastTomorrow"),
      slides: $("slides"),
      slideTrack: $("slideTrack"),
      pager: $("pager")
    };

    const weekdays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
    const weatherCodeMap = {
      0: ["晴", "☀"],
      1: ["大致晴朗", "◐"],
      2: ["局部多云", "☁"],
      3: ["阴", "☁"],
      45: ["雾", "≋"],
      48: ["雾凇", "≋"],
      51: ["小毛毛雨", "☂"],
      53: ["毛毛雨", "☂"],
      55: ["大毛毛雨", "☂"],
      61: ["小雨", "☔"],
      63: ["中雨", "☔"],
      65: ["大雨", "☔"],
      80: ["阵雨", "☔"],
      81: ["阵雨", "☔"],
      82: ["强阵雨", "☔"],
      95: ["雷雨", "⚡"],
      96: ["雷雨冰雹", "⚡"],
      99: ["强雷雨冰雹", "⚡"]
    };

    let dimmed = false;
    let lastMinute = "";
    let currentPage = 0;
    const pageCount = 3;

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function updateClock() {
      const now = new Date();
      const hour = now.getHours();
      const minute = now.getMinutes();
      const minuteKey = `${hour}:${minute}`;
      const hourAngle = ((hour % 12) + minute / 60) * 30;
      const minuteAngle = minute * 6;

      el.hourHand.style.setProperty("--r", `${hourAngle}deg`);
      el.minuteHand.style.setProperty("--r", `${minuteAngle}deg`);
      el.digitalTime.textContent = `${pad(hour)}:${pad(minute)}`;

      if (minuteKey !== lastMinute) {
        lastMinute = minuteKey;
        el.dateLine.textContent = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;
        driftForBurnInProtection();
      }
    }

    function driftForBurnInProtection() {
      const x = Math.round((Math.random() - .5) * 10);
      const y = Math.round((Math.random() - .5) * 8);
      document.documentElement.style.setProperty("--drift-x", `${x}px`);
      document.documentElement.style.setProperty("--drift-y", `${y}px`);
    }

    function renderWeather(data, sourceLabel) {
      const current = data.current;
      const [condition, icon] = weatherCodeMap[current.weather_code] || ["未知天气", "·"];
      const time = new Date(current.time);

      el.weatherLocation.textContent = sourceLabel;
      el.weatherIcon.textContent = icon;
      el.weatherText.textContent = condition;
      el.temperature.textContent = `${Math.round(current.temperature_2m)}°`;
      el.humidity.textContent = `湿度 ${Math.round(current.relative_humidity_2m)}%`;
      el.windSpeed.textContent = `风 ${Math.round(current.wind_speed_10m)} km/h`;
      renderForecastCard(el.forecastToday, data.daily, 0, "今天");
      renderForecastCard(el.forecastTomorrow, data.daily, 1, "明天");
      el.weatherNote.textContent = `更新 ${pad(time.getHours())}:${pad(time.getMinutes())} · Open-Meteo`;
    }

    function renderForecastCard(card, daily, index, label) {
      if (!daily || !daily.time[index]) return;

      const code = daily.weather_code[index];
      const [condition, icon] = weatherCodeMap[code] || ["未知天气", "·"];
      const max = Math.round(daily.temperature_2m_max[index]);
      const min = Math.round(daily.temperature_2m_min[index]);
      const rain = daily.precipitation_probability_max ? daily.precipitation_probability_max[index] : null;

      card.querySelector(".forecast-icon").textContent = icon;
      card.querySelector(".forecast-day").textContent = label;
      card.querySelector(".forecast-condition").textContent = rain == null ? condition : `${condition} · 降水${rain}%`;
      card.querySelector(".forecast-temp").textContent = `${max}°/${min}°`;
    }

    async function fetchWeather(latitude, longitude, sourceLabel) {
      const params = new URLSearchParams({
        latitude,
        longitude,
        current: "temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m",
        daily: "weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max",
        forecast_days: "2",
        timezone: "auto"
      });
      const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!response.ok) throw new Error("weather request failed");
      renderWeather(await response.json(), sourceLabel);
    }

    function updateWeather() {
      const fallback = () => fetchWeather("1.3521", "103.8198", "新加坡天气").catch(() => {
        el.weatherLocation.textContent = "天气暂不可用";
        el.weatherText.textContent = "网络或定位受限";
        el.weatherNote.textContent = "请检查网络，或在脚本中设置固定坐标";
      });

      if (!navigator.geolocation) {
        fallback();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        ({ coords }) => fetchWeather(coords.latitude.toFixed(4), coords.longitude.toFixed(4), "当前位置天气").catch(fallback),
        fallback,
        { enableHighAccuracy: false, timeout: 7000, maximumAge: 30 * 60 * 1000 }
      );
    }

    function renderPager() {
      el.pager.innerHTML = "";
      for (let i = 0; i < pageCount; i += 1) {
        const button = document.createElement("button");
        button.className = "page-dot";
        button.type = "button";
        button.setAttribute("aria-label", `切换到第 ${i + 1} 页`);
        button.setAttribute("aria-current", String(i === currentPage));
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          setPage(i);
        });
        el.pager.appendChild(button);
      }
    }

    function setPage(page) {
      currentPage = (page + pageCount) % pageCount;
      el.slideTrack.style.setProperty("--page", currentPage);
      [...el.pager.children].forEach((dot, index) => {
        dot.setAttribute("aria-current", String(index === currentPage));
      });
    }

    function initSlider() {
      let startX = 0;
      let pointerDown = false;

      el.slides.addEventListener("pointerdown", (event) => {
        pointerDown = true;
        startX = event.clientX;
        el.slides.setPointerCapture(event.pointerId);
      });

      el.slides.addEventListener("pointerup", (event) => {
        if (!pointerDown) return;
        pointerDown = false;
        const delta = event.clientX - startX;
        if (Math.abs(delta) > 42) {
          setPage(currentPage + (delta < 0 ? 1 : -1));
        }
      });
    }

    function toggleDim() {
      dimmed = !dimmed;
      document.documentElement.classList.toggle("dim", dimmed);
    }

    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          await navigator.wakeLock.request("screen");
        }
      } catch (_) {}
    }

    document.addEventListener("click", toggleDim);
    document.addEventListener("dblclick", () => location.reload());
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) requestWakeLock();
    });

    updateClock();
    renderPager();
    initSlider();
    updateWeather();
    requestWakeLock();
    setInterval(updateClock, 1000);
    setInterval(updateWeather, 15 * 60 * 1000);
  </script>
</body>
</html>
